<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.
      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>VIITS NEXUS — Monitor Semana Santa 2026</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      VIITS NEXUS — 24/7 Videowall Auto-Recovery
      If the server restarts or JS crashes, auto-refresh after 5 seconds.
    -->
    <script>
      // 24/7 WATCHDOG: Auto-refresh on fatal JS errors
      (function() {
        var errorCount = 0;
        var MAX_ERRORS = 5;
        var REFRESH_DELAY = 5000;

        // Catch fatal React/JS errors
        window.addEventListener('error', function(e) {
          errorCount++;
          console.error('[VIITS WATCHDOG] Error #' + errorCount + ':', e.message);
          if (errorCount >= MAX_ERRORS) {
            console.warn('[VIITS WATCHDOG] Too many errors, refreshing in 5s...');
            setTimeout(function() { window.location.reload(); }, REFRESH_DELAY);
          }
        });

        // If React root becomes empty (crash), auto-refresh
        setInterval(function() {
          var root = document.getElementById('root');
          if (root && root.children.length === 0 && document.readyState === 'complete') {
            console.warn('[VIITS WATCHDOG] Root empty — React crashed. Refreshing...');
            setTimeout(function() { window.location.reload(); }, REFRESH_DELAY);
          }
        }, 10000);

        // Health check: if server goes down, retry until it comes back
        setInterval(function() {
          fetch('/health', { method: 'GET', cache: 'no-store' })
            .catch(function() {
              console.warn('[VIITS WATCHDOG] Server unreachable, retrying in 10s...');
              setTimeout(function() { window.location.reload(); }, 10000);
            });
        }, 30000);
      })();
    </script>
  </body>
</html>
